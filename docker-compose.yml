name: voicesense

services:
  postgres:
    image: postgres:17-alpine
    container_name: voicesense-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: voicesense
      POSTGRES_USER: voicesense
      POSTGRES_PASSWORD: voicesense
    ports:
      - "5432:5432"
    volumes:
      - voicesense_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U voicesense -d voicesense"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: voicesense-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - voicesense_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  voicesense_postgres_data:
  voicesense_redis_data: